name: CI — Lint, Type Check & Build

on:
  push:
    branches:
      - "**" # Run CI on every branch push
  pull_request:
    branches:
      - main # Block PRs to main if checks fail

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true # Cancel outdated runs on the same branch

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Lint
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────────
  # JOB 2: TypeScript Type Check
  # ──────────────────────────────────────────────
  typecheck:
    name: 🔷 TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

  # ──────────────────────────────────────────────
  # JOB 3: Build
  # ──────────────────────────────────────────────
  build:
    name: 🏗️ Next.js Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck] # Build only if lint & typecheck pass
    env:
      # Inject all required environment variables for a successful build
      MONGO_URI: ${{ secrets.MONGO_URI }}
      TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
      DOMAIN: ${{ secrets.DOMAIN }}
      MAILTRAP_USER: ${{ secrets.MAILTRAP_USER }}
      MAILTRAP_PASS: ${{ secrets.MAILTRAP_PASS }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1 # Keep for 1 day (used by CD workflow)
