name: CD — Deploy to Netlify

on:
  push:
    branches:
      - main # Only deploy when code is merged/pushed to main

concurrency:
  group: cd-production
  cancel-in-progress: false # Never cancel a production deployment mid-flight

jobs:
  deploy:
    name: 🚀 Deploy to Netlify
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deploy-url }}

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      TOKEN_SECRET: ${{ secrets.TOKEN_SECRET }}
      DOMAIN: ${{ secrets.DOMAIN }}
      MAILTRAP_USER: ${{ secrets.MAILTRAP_USER }}
      MAILTRAP_PASS: ${{ secrets.MAILTRAP_PASS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to Netlify (Production)
        id: deploy
        run: |
          OUTPUT=$(netlify deploy \
            --build \
            --prod \
            --message="Deploy from GitHub Actions — ${{ github.sha }}" \
            --json)
          echo "deploy-url=$(echo $OUTPUT | jq -r '.deploy_url')" >> $GITHUB_OUTPUT
          echo "site-url=$(echo $OUTPUT | jq -r '.url')" >> $GITHUB_OUTPUT
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Print deployment URL
        run: |
          echo "✅ Deployed to: ${{ steps.deploy.outputs.site-url }}"
          echo "🔗 Deploy URL: ${{ steps.deploy.outputs.deploy-url }}"
